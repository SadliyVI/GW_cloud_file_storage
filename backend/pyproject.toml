[tool.ruff]
target-version = "py310"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "migrations",
    "staticfiles",
    "media",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "N",
    "UP",
    "B",
    "DJ",
]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"cloud_storage/settings/dev.py" = ["F403"]
"cloud_storage/settings/prod.py" = ["F403"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"